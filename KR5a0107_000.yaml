front:
  text: 太上赤文洞古經註序夫至道無言眞空非色思之者莫能知觀之者不可見赜之不可得行之不能到陶鑄天地率循造化寂而不動應滿六虛令萬物蒙休羣生復命巍巍乎至矣哉非聖人孰能通之者耶況元始大聖慈心廣布慧照十方觀見衆生忘歸失本宛轉世間輪迴不息長劫受苦不能自明遂感法雨敷滋宣揚妙道引接有情出生死海遊情虛之境恬惔之郷超乎塵垢歩乎寥廓逍遥獨化微妙玄通無爲自然返於純素冥極混茫者也太上赤文洞古經註
  hash: sha256:4af4440fdcad9b24094be3fd7b7eb56c4a195344170b5c903400b611528c770c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0107_HFL_000-001a, image: hfl/0054/0054-044.png}
body:
  text: 龜山長签子註操眞章上有動之動出於不動有動者應機也無動者抱元守一也歸根復命也故經云清者濁之源靜者動之基唯精唯一允執厥中夫物芸芸各復歸其根歸根曰靜至靜不動也有爲之爲出於無爲無爲則神歸神本湛寂感而遂通不得已而後起隨機接物妙用無窮去智與仁故循天之理淡然无極而衆妙歸之神歸則萬物云寂專氣致柔能如嬰兒抱守沖和眞氣氤氳萬物皆長生也知和曰常心使氣曰强强者堅强壯老死之徒也不動則氣泯氣泯則萬物無生氣絶神逝九竅百骸變滅塵土也更何疑之神神相守物物相資厥本其根以虛養虚以實養實何以故忘形養氣忘氣養神忘神養虚虚室生白吉祥止止神氣沖寜靈根深固故成長生久視之道也黙而悟之我自識之至道之玄不假外物而得黙黙昏昏无應无問靈光獨耀逈脫根塵體露眞常不隨萬法可以全生可以復本也入乎無間無間者無有也是不言之教無爲之益圓通无碍應化無窮遍滿十方時時運動無有間斷也不死不生玄珠燦燦今古常明萬物混成法法平等非靜非染无始无終故曰不死不生者也與天地爲一天道清虛所以能長地道寧靜所以能久人能悟理達其妙道致虚極守靜篤恬惔寂然不爲萬物之所累清淨無爲可以與天地爲一者哉入聖章中忘於目則光溢無極五色亂明令人目盲色者彰也色色者未甞顯何謂也法眼圓通明照十方三界觀物無物觀空不空視之㝠㝠杳㝠之中獨見暁焉靈光充塞無窮極也泯於耳則心識常淵五音亂聦令人耳聾心是清淵本自湛澄是非言語美惡聲音皆爲妄情僞物飄風驟雨動擾心源神窒不靈若能泯絶是非不受於中無聲之中獨聞和焉然後可以聽玄歌白雪不鼓陽春仙音之曲調也兩機俱忘絶衆妙之門聲色雙泯動靜两忘聽之不以氣視之不以神是謂太玄之妙虚曠之靈深之又深而能物馬神之又神而能精焉无爲之爲不知而知靈明曠徹廣大虚寂妙無邊際也純純全全合乎大方物我俱忘有無不立昏昏黙黙杳杳冥㝠无邊无際非外非中其游无端其出無方化育萬物不可爲象混成無方隅也溟溟涬涬合乎無倫至道重玄浩浩蕩蕩理無等倫藏之則爲元精用之則爲萬靈含之則爲太一放之則爲太清无相无名至尊至貴迷之則凡夫悟之則聖賢天地之大我之所維古今聖賢得道眞人提挈天地把握隂陽雕琢萬物澤及羣品不爲難乎萬物之衆我之所持宇宙在乎其手萬化生乎一身曷有窮終以語其弊哉聖人直說妙道普現普光惟恐後世凡夫不信疑惑大發謙辭若言不盡其理以語爲弊惡舛訛之說也住世章下養其無象象故常存眞氣薰蒸而時無寒暑純陽流注而民無死生故曰心燈朗照法身長存慧燭不明道容豈載守其無體體故全眞天地相合以降甘露滋榮羣品人能安靜和暢寳瓶堅固玉漿香美眞水下降滋養妙體返老如童孩不亦善乎全眞相濟可以長久水火旣濟魂魄相守鉛汞相凝鍊成大藥結就金丹燦爛光輝無幽不燭純白入素無爲復朴長生不滅没身不殆號曰眞人者也天得其眞故長天得純粹不雜之道則故能覆蓋羣有包羅萬象歷劫清凝鑒物无私不言而應妙用無窮髙虚長遠大無不包久而不易也地得其眞故久地得其眞則育養萬物深根固蒂安靜無爲乃長久也人得其眞故壽死而不亡者壽但世人悟其眞趣得其妙元與道合眞没身不殆同其聖腎令後代祭祀不輟何以加此焉世人所以不能長久者爲喪其無象散其无體五味濁口五臭熏鼻聲色閼塞耳目取捨滑心使性飛揚迷情徇物念念相嬰使心智遊乎外鬼神入其内是非寵辱亂擾靈源與物相刃相靡終身疲役區區業綱而不知其歸可不悲乎身適美厚錦繡羅縠意迷邪見顚倒妄想至於窮年不知天命喪己於物失性於俗者謂之倒置之民可不哀哉不能使百骸九竅與眞體並存故死矣内本清靜光明虚白晃耀奈何愛染萬縁不生返照飄飄一性之散沉沉萬劫之迷難省眞身遷於別蛻迷其眞源壞其内也萬劫輪迴生死海中不能超度甚可哀憐矣太上赤文洞古經註
