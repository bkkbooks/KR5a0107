body:
  text: 有動之動出於不動有動者應機也不動者抱元守一也歸根復命也故經云清者濁之源動者靜之基惟精惟一允執厥中夫物芸芸各復歸其根歸根曰靜至靜不動也有爲之爲出於無爲無爲則神歸神本湛寂感而遂通不得已而後起隨機接物妙用無窮去智與仁故循天之理淡然無極而眾妙歸之神歸則萬物寂專氣致柔能如嬰兒抱守冲和眞氣氤氳萬物皆長生也知和曰常心使氣曰强强者堅强壯老死之徒也不動則氣泯氣泯則萬物生氣絶神逝九竅百骸變滅塵土也更何疑之神神相守物物相資厥本歸根以虛養虛以實養實何以故忘形養氣忘氣養神忘神養虛虛室生白吉祥止止神氣沖甯靈根深固故成長生久視之道也默而悟之我自識之至道之玄不假外物而得默默昏昏無應無間靈光獨耀逈脫根塵體露眞常不隨萬法可以全生可以復本也入乎無間無間者無有也是不言之教無爲之益圓通無礙應化無窮遍滿十方時時運動無有間斷也不死不生玄珠燦燦今古常明萬物混成法法平等非淨非染無始無終故曰不死不生者也與天地爲一天道清虛所以能長地道甯靜所以能久人能悟理達其妙道致虛極守靜篤恬惔寂然不爲萬物之所累清靜無爲可以與天地爲一者哉忘於目則光溢無極五色亂明令人目盲色者彰也色色者未嘗顯何謂也法眼圓通明照十方三界觀物無物觀空不空視之冥冥杳杳之中獨見曉焉靈光充塞無窮極也泯於耳則心識常淵五音亂聰令人耳聾心是清淵本自湛澄是非言語美惡聲音皆爲妄情僞物飄風驟雨動擾心源神室不靈若能泯絶是非不受於中無聲之中獨聞和焉然後可以聽玄歌白雪不鼓陽春仙音之曲調也兩機俱忘絶眾妙之門聲色雙泯動靜兩忘聽之不以氣視之不以神是謂太玄之妙虛曠之靈深之又深而能物焉神之又神而能精焉無爲之爲不知而知靈明曠徹廣大虛寂妙無邊際也純純全全合乎大方物我俱忘有無不立昏昏默默杳杳冥冥無邊無際非外非中其游無端其出無方化育萬物不可爲象混成無方隅也溟溟涬涬合乎無倫至道重玄浩浩蕩蕩理無等倫藏之則爲元精用之則爲萬靈舍之則爲太一放之則爲太清無相無名至尊至貴迷之則凡夫悟之則聖賢天地之大我之所維古今聖賢得道眞人提挈天地把握陰陽雕琢萬物澤及羣品不亦難乎萬物之眾我之所持宇宙在乎其手萬化生乎其身曷有窮終以語其弊哉聖人直說妙道普現普光惟恐後世凡夫不信疑惑大發謙辭若言不盡其理以語爲弊惡舛訛之說也養其無象象故常存眞氣薰蒸而時無寒暑純陽流注而民無死生故曰心燈朗照法身常存慧燭不明道容豈載守其無體體故全眞天地相合以降甘露滋榮羣品人能安靜和暢寶瓶堅固玉漿香美眞水下降滋養妙體返老如童孩不亦善乎全眞相濟可以長久水火旣濟魂魄相守鉛汞相凝鍊成大藥結就金丹燦爛光輝無幽不燭純白入素無爲復朴長生不滅沒身不殆號曰眞人者也天得其眞故長天得純粹不雜之道則故能覆蓋羣有包羅萬象厯劫清凝鑒物無私不言而應妙用無窮高虛長遠大無不包久而不易也地得其眞故久地得其眞則育養萬物深根固蒂安靜無爲乃長久也人得其眞故壽死而不亡者壽但世人悟其眞趣得其妙元與道合眞沒身不殆同爲聖賢令後代祭祀不輟何以加此焉世人所以不能長久者爲喪其無象散其無體五味濁口五臭熏鼻聲色閼塞耳目取捨滑心使性飛揚迷情徇物念念相嬰使心智遊乎外鬼神入其內是非寵辱亂擾靈源與物相兩相磨終身疲役區區業網而不知其歸可不悲乎身適美厚錦繡羅縠意迷邪見顚倒妄想至於窮年不知天命喪已於物失性於俗者謂之倒置之民可不哀哉不能使百骸九竅與眞體並存故死矣內本清靜光明虛白晃耀柰何愛染萬緣不生返照飄飄一性之散沉沉萬劫之迷難省眞身遷於別蛻迷其眞源壞其內也萬劫輪迴生死海中不能超度甚可哀憐矣
